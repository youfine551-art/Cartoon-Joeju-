<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Joeju</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .ad-box {
            background: white;
            border: 2px dashed gray;
            text-align: center;
            padding: 15px;
            margin: 15px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
            text-align: center;
        }

        .watch-btn {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #ddd;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Cartoon Joeju</h1>
    <p>Watch Amazing Cartoons Created by Joeju</p>
</header>

<div class="ad-box">
    Your Ad Here
</div>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/300x180?text=Episode+1" alt="Episode 1">
        <div class="card-content">
            <h3>Episode 1</h3>
            <a class="watch-btn"
               href="https://samplelib.com/lib/preview/mp4/sample-5s.mp4"
               target="_blank">
               Watch
            </a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x180?text=Episode+2" alt="Episode 2">
        <div class="card-content">
            <h3>Episode 2</h3>
            <a class="watch-btn"
               href="https://samplelib.com/lib/preview/mp4/sample-10s.mp4"
               target="_blank">
               Watch
            </a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x180?text=Episode+3" alt="Episode 3">
        <div class="card-content">
            <h3>Episode 3</h3>
            <a class="watch-btn"
               href="https://samplelib.com/lib/preview/mp4/sample-15s.mp4"
               target="_blank">
               Watch
            </a>
        </div>
    </div>

</div>

<div class="ad-box">
    Another Ad Space
</div>

<footer>
    © 2026 Cartoon Joeju. All Rights Reserved.
</footer>

</body>
  </html>
